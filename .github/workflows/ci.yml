name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # BACKEND
      - name: Backend Install
        run: |
          cd Backend
          npm install
      
      - name: Backend Lint
        run: |
          cd Backend
          npm run lint || true
      
      - name: Backend Tests
        run: |
          cd Backend
          npm test || true
      
      # FRONTEND
      - name: Frontend Install
        run: |
          cd frontend
          npm install
      
      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint || true
      
      - name: Frontend Build
        run: |
          cd frontend
          npm run build || true
      
      # DOCKER BUILD
      - name: Build Docker Backend
        run: docker build -f docker/Dockerfile.backend -t backend:latest .
      
      - name: Build Docker Frontend
        run: docker build -f docker/Dockerfile.frontend -t frontend:latest .
      
      # SONARQUBE (OBLIGATOIRE)
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=sadak5
            -Dsonar.projectKey=SaDak5_ProjetDevops
      
      # TRIVY (OBLIGATOIRE - SCAN SECURITE)
      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      
      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
