name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  docker-compose-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker version

      - name: Show Docker Compose version
        run: docker compose version

      - name: Validate docker compose file
        run: docker compose -f docker-compose.yml config

      - name: Build images
        run: docker compose -f docker-compose.yml build --no-cache

      - name: Start stack
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3004/users/all > /tmp/backend.json; then
              cat /tmp/backend.json
              exit 0
            fi

            echo "Waiting for backend... ($i/30)"
            sleep 5
          done

          echo "Backend did not become ready in time"
          docker compose -f docker-compose.yml logs --no-color
          exit 1

      - name: Check frontend
        run: |
          curl -fsS http://localhost:3000 > /tmp/frontend.html
          test -s /tmp/frontend.html

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
