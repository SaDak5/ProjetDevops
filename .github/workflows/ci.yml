name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Backend Install
        run: |
          cd Backend
          npm install
      
      - name: Backend Lint
        run: |
          cd Backend
          npm run lint || true
      
      - name: Frontend Install
        run: |
          cd frontend
          npm install
      
      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint || true
      
      - name: Frontend Build
        run: |
          cd frontend
          npm run build || true
      
      - name: Build Docker Backend
        run: docker build -f docker/Dockerfile.backend -t backend:latest .
      
      - name: Build Docker Frontend
        run: docker build -f docker/Dockerfile.frontend -t frontend:latest .
