name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # BACKEND
      - name: Backend Install
        run: |
          cd Backend
          npm install
      
      - name: Backend Lint
        run: |
          cd Backend
          npm run lint || echo "No lint script"
      
      - name: Backend Tests
        run: |
          cd Backend
          npm test || echo "No test script"
      
      # FRONTEND
      - name: Frontend Install
        run: |
          cd frontend
          npm install
      
      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint || echo "No lint script"
      
      - name: Frontend Build
        run: |
          cd frontend
          npm run build
      
      # DOCKER BUILD
      - name: Build Docker Backend
        run: docker build -f docker/Dockerfile.backend -t backend:latest .
      
      - name: Build Docker Frontend
        run: docker build -f docker/Dockerfile.frontend -t frontend:latest .
      
      # SONARQUBE (obligatoire)
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=sadak5
            -Dsonar.projectKey=SaDak5_ProjetDevops
      
      # TRIVY (scan image Docker)
      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      
      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      
      # SNYK (scan dépendances - obligatoire Page 5)
      - name: Snyk Scan Backend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
          path: Backend
        continue-on-error: true
      
      - name: Snyk Scan Frontend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
          path: frontend
        continue-on-error: true
      
      # PUSH IMAGES DOCKER HUB (obligatoire Page 4)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Backend to Docker Hub
        run: |
          docker tag backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
      
      - name: Push Frontend to Docker Hub
        run: |
          docker tag frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
